<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Portfolio Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <style>
        body {
            background-color: #f0f8ff;
            padding-top: 70px;
        }

        h1 {
            color: orange;
            text-align: center;
            margin-bottom: 30px;
        }

        .carousel-inner>.item>img {
            width: 100%;
            height: 500px;

            object-fit: contain;
            object-position: center;

        }

        .navbar-inverse {
            background-color: #222;
            border-color: #080808;
        }

        .carousel-caption {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 5px;
        }

        .navbar-nav>li>a {
            font-size: 16px;
        }
    </style>
</head>

<body data-spy="scroll" data-target=".navbar" data-offset="50">


    <nav class="navbar navbar-inverse navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#myNavbar">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#">Intro</a>
            </div>
            <div class="collapse navbar-collapse" id="myNavbar">
                <ul class="nav navbar-nav">
                    <li><a href="56.html">My Information</a></li>
                    <li><a href="T.html">My School</a></li>
                    <li><a href="36.html">My Hobbies</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container">
        <div id="myCarousel" class="carousel slide" data-ride="carousel">


            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide-to="1"></li>
                <li data-target="#myCarousel" data-slide-to="2"></li>
            </ol>


            <div class="carousel-inner">
                <div class="item active">
                    <img src="Zakiya.png" alt="img1">
                    <div class="carousel-caption">
                        <h3>Welcome!</h3>
                        <p>This is my introduction.</p>
                    </div>
                </div>

                <div class="item">
                    <img src="174521238120250319_115030 (1).jpg" alt="img2">
                    <div class="carousel-caption">
                        <h3>My School</h3>
                        <p>Memories from school.</p>
                    </div>
                </div>

                <div class="item">
                    <img src="Untitled Project.jpg" alt="img3">
                    <div class="carousel-caption">
                        <h3>My Hobbies</h3>
                        <p>Things I enjoy doing.</p>
                    </div>
                </div>
            </div>


            <a class="left carousel-control" href="#myCarousel" data-slide="prev">
                <span class="glyphicon glyphicon-chevron-left"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="right carousel-control" href="#myCarousel" data-slide="next">
                <span class="glyphicon glyphicon-chevron-right"></span>
                <span class="sr-only">Next</span>
            </a>

        </div>
    </div>

</body>

</html>
