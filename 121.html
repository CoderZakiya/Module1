<!DOCTYPE html>
<html>

<head>
    <title>DOM Styled Project</title>

    <style>
        body {
            background: linear-gradient(135deg, #f7d7f7, #d7f0ff);
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #8b1e1e;
            margin-top: 30px;
        }

        .box {
            background: white;
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px gray;
        }

        button {
            padding: 10px 20px;
            background: #ff6b6b;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #e63946;
        }

        p {
            font-size: 18px;
            color: #333;
        }
    </style>
</head>

<body>
    <p>Current date and hour</p>
    <button onclick="myfunction()">Click me!</button>
    <p id="hour"></p>
    <p id="greet"></p>
    <script>
        function myfunction() {
            var greeting;
            var time = new Date().getHours();
            if (time < 10) {
                greeting = "Good Morning";
            }
            else if (time < 20) {
                greeting = "Good Day";
            }
            else {
                greeting = "Good Evening";
            }
            document.getElementById("hour").innerHTML = "Current Hour is" + time;
            document.getElementById("greet").innerHTML = greeting;
        }
    </script>
</body>

</html>
