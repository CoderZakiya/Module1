<!DOCTYPE html>
<html>

<head>
    <style>
        .div {
            background-color: aqua;
            padding: 2px;
        }

        div.first {
            opacity: 0.1;
        }

        div.second {
            opacity: 0.3;
        }

        div.third {
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <h1>The opacity Property</h1>
    <p></p>
    <div class="first">` shows opacity 0.1.</div>
    <div class="second">` shows opacity 0.3.</div>
    <div class="third">` shows opacity 0.6.</div>
    <div>shows opacity 1 (default).</div>
</body>

</html>
