<!DOCTYPE html>
<html>

<head>
    <style>
        img#flowerright {
            float: right;
        }

        img#flowerleft {
            float: left;
        }
    </style>
</head>

<body>
    <h2>Float Right</h2>
    <p>In this example,the image will float to the right</p>
    <p>
        <img id="flowerright" src="download (2).jpg" alt="flower" style="width:100px;height:100px;">
        <img id="flowerleft" src="download (2).jpg" alt="tree" style="width:100px;height:100px;">
    </p>
</body>

</html>
