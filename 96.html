<!DOCTYPE html>
<html>

<body>
    <p id="th"></p>
    <script>
        function findMax() {
            var i;
            var max = 0;
            for (i = 0; i < arguments.length; i++) {
                if (arguments[i] > max) {

                    max = arguments[i];
                }
            }
            return max;

        }

        document.getElementById("th").innerHTML = findMax(1, 2, 4);
    </script>
</body>

</html>
