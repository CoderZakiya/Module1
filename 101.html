<!DOCTYPE html>
<html>

<head>
    <title>Project</title>

    <style>
        body {
            background-color: #ebf1f7;
            text-align: center;
            font-family: Arial;
        }

        .box {
            background-color: white;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #2c3e50;
        }

        p {
            color: #34495e;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>Current Date and Rounded Values</h1>

    <div class="box">
        <p id="project"></p>
    </div>

    <script>
        var number = "";
        var i;

        for (i = 3; i < 10; i++) {
            number += "<br>";
        }

        var randomValue = Math.floor(Math.random() * 100);

        var date = new Date();

        document.getElementById("project").innerHTML =
            "The random value is " + randomValue +
            "<br><br>Today's Date is " + date.toDateString() +
            number;

    </script>

</body>

</html>
