<!DOCTYPE html>
<html>

<head>
   <style>
      body {
         font: 30px;
         background: fixed;
         text-align: center;
         padding: 1px;
      }

      h1 {
         font-family: Arial, Helvetica, sans-serif;
         font-weight: 400;
         color: brown;
         margin-top: 30px;
      }

      input {
         padding: 1px;
         margin: 2px;
         border: 10px;
         border-radius: 0.5px;
      }

      button {
         background: navy;
         padding: white;
         border: 10px 25px;
         border-radius: 20px;

         cursor: pointer;
      }

      #timer {
         color: blueviolet;
      }
   </style>

</head>

<body>
   <h1>Lucky Draw</h1>

   <p>Guess a number to win</p>

   <input type="text" id="name" placeholder="your name" required><br>

   <p id="msg-name"></p>

   <input type="number" id="guess" placeholder="Guess a number(1 to 5)" min="1" max="5" required><br>

   <p id="msg-guess"></p>

   <button onclick="checkForm()">Try my luck</button>

   <p id="result"></p>

   <p id="timer"></p>

   <script>

      var seconds = 0;

      setInterval(function () {

         seconds = seconds + 1;

         document.getElementById("timer").textContent =

            "You have been here for " + seconds + " seconds!";

      }, 1000);

      function checkForm() {

         var name = document.getElementById("name").value;

         var guess = document.getElementById("guess").value;

         var ok = true;

         // Name validation

         if (name == "") {

            document.getElementById("msg-name").textContent =

               "Please enter your name!";

            document.getElementById("msg-name").style.color = "red";

            ok = false;

         } else {

            document.getElementById("msg-name").textContent =

               "Great name!";

            document.getElementById("msg-name").style.color = "green";

         }

         // Guess validation

         if (guess == "") {

            document.getElementById("msg-guess").textContent =

               "Please enter a guess!";

            document.getElementById("msg-guess").style.color = "red";

            ok = false;

         } else {

            document.getElementById("msg-guess").textContent =

               "Great guess!";

            document.getElementById("msg-guess").style.color = "green";

         }

         // Lucky draw logic

         if (ok == true) {

            var Lucky = Math.floor(Math.random() * 5) + 1;

            if (guess == Lucky) {

               document.getElementById("result").textContent =

                  "You win! " + name +

                  ". The lucky number was " + Lucky + "!";

               document.getElementById("result").style.color = "green";

            } else {

               document.getElementById("result").textContent =

                  "So close, " + name +

                  "! The lucky number was " + Lucky +

                  ". Try Again!";

               document.getElementById("result").style.color = "navy";

            }

         }

      }

   </script>
</body>

</html>
