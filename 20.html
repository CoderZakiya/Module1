<!DOCTYPE html>
<html lang="en">

<head>
    <title>Box model example</title>
    <meta charset="UTF-8">
    <style type="text/css">
        .v1 {
            width: 200px;
            background-color: skyblue;
            padding: 10px;
            border: 5px solid black;
            margin: 7px
        }

        .v2 {
            width: 160px;
            background-color: skyblue;
            padding: 2px;
            border: 3px solid pink;
            margin: 4px;
        }

        hr {
            background-color: blue;
        }
    </style>
</head>

<body>
    <h1>Box model css</h1>
    <p class="v1">This is first line</p>
    <p class="v2">this is middle part</p>
    <hr>
</body>

</html>
