<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Typography example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <style>
        h1 {
            color: rgb(33, 114, 114);
            border: 1px solid pink;
        }
    </style>
</head>

<body>
    <h1>Abbraviations</h1>
    <p style="color:red;"><abbr title="codingal">cdgl</abbr></p>
    <h1>blockquots</h1>
    <blockquote class="blockquote">
        <p>Codingal is on a mission</p>
        <footer class="blockquote-footer">From <span style="color: blueviolet;">Codingal</footer>
    </blockquote>
    <h1>Multiple Code lines</h1>
    <pre>
        Codingal is 
        on a
      <mark> <span style="color:blue;"> mission.</mark>
       </pre>
    <h1>Keyboard Inputs</h1>
    <p>Zakiya<kbd>is a student of codingal</kbd></p>
</body>
