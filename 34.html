<!DOCTYPE html>
<html>

<head>

    <title>Bootstrap Grid System</title>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

    </script>
</head>

<body>
    <div class="container">
        <h1>Codingal.</h1>
        <p>Resize the browser window to see the effect.</p>
        <div class="row">
            <!--Size Medium and extra small-->
            <div class="col-md-8 col-xs-4" style="background-color:blue;border:1px solid black">xs</div>

            <div class="col-ml-8 col-xs-4" style="background-color:orange;border:1px solid black">xs-4</div>
        </div>
        <div class="row">
            <!--size small and medium-->
            <div class="col-s-7 col-md-9" style="background-color:red;border:1px solid pink">xs</div>
            <div class="col-lg-10 col-xs-11" style="background-color:red;border:1px solid green">xs-12</div>
        </div>

</body>

</html>
