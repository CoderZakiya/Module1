<!DOCTYPE html>
<html>

<head>
    <title>DOM Styled Project</title>

    <style>
        body {
            background: linear-gradient(135deg, #f7d7f7, #d7f0ff);
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #8b1e1e;
            margin-top: 30px;
        }

        .box {
            background: white;
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px gray;
        }

        button {
            padding: 10px 20px;
            background: #ff6b6b;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #e63946;
        }

        p {
            font-size: 18px;
            color: #333;
        }
    </style>
</head>

<body>
    <h1>Javascript Data types.</h1>
    <script>
        var a = 7;
        var b = 98;
        var c = 98;
        var d = null;
        var e;//Undefined
        document.write("a and b are equal:" + (a == b));
        document.write("<br>");
        document.write("b and c are equal:" + (b == c));
        document.write("<br>");
        document.write("The value of d is" + d);
        document.write("<br>");
        document.write("The value of e is" + e);
        document.write("<br>");
    </script>
</body>

</html>
