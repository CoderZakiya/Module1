<!Doctype html>
<html>

<head>
    <style>
        div {
            right: 20px;
            border: 1px solid blue;
        }

        div.absulate {
            position: absolute;
            left: 40px;
            border: 2px solid green;
        }

        div.relative {
            position: relative;
            left: 80px;
            border: 3px solid black;
        }

        div.fixed {
            position: fixed;
            top: 0px;
            right: 50px;
            border: 3px solid green;

        }

        div.sticky {
            position: sticky;
            top: 3px;
            left: 15px;
            width: 112px;
            border: 2px solid black;

        }

        div.
    </style>
</head>

<body>
    <h2>positioning in css</h2>
    <div>It stays in the normal page flow.
    </div>
    <div class="sticky">It will scroll normally at first,</div>
    <div class="relative">The whole relative div shifts right by 100px</div>
    <div class="fixed">It stays pinned at the top-right of the browser window even while scrolling.
    </div>

</body>

</html>
